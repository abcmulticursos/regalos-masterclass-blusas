<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descarga tus obsequios</title>

    <meta property="og:title" content="🎁 Descarga tus obsequios">
    <meta property="og:description" content="Toca para descargar tus materiales de regalo.">
    <meta property="og:image" content="https://regalos-masterclass-blusas.netlify.app/images/miniatura-pagina-regalos-blusas.jpg">
    <meta property="og:type" content="website">

<style>
    /* Estilos base */
    html, body { min-height: 100%; }
    body {
        background-image: linear-gradient(to bottom, #c021f9, #f92e91);
        background-attachment: fixed;
        color: white;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px 2.5mm;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        box-sizing: border-box;
    }
    .main-container {
        max-width: 600px;
        width: 100%;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .welcome-image-container { margin-bottom: 20px; width: 100%; }
    .welcome-image-container img {
        width: 100%;
        height: auto;
        border-radius: 17px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }
    .flecha-container { margin: 20px 0; width: 60px; }
    .flecha-container img { width: 100%; height: auto; }
    
    .text-rectangle {
        background-color: #f3f0f0;
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 10px;
        color: black;
        width: 100%;
        box-sizing: border-box;
        font-size: 20pt;
        font-weight: bold;
    }

    /* BOTÓN MODIFICADO A AMARILLO (12% Magenta, 100% Amarillo) */
    .download-button {
        display: inline-block;
        background-color: #ffe100; /* El color resultante */
        color: black; /* Texto negro para que resalte sobre el amarillo */
        padding: 20px 30px;
        text-decoration: none;
        border-radius: 50px;
        font-size: 18px;
        font-weight: bold;
        width: 90%;
        max-width: 400px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        animation: pulse-animation 2s infinite;
    }

    @keyframes pulse-animation {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 225, 0, 0.7); }
        70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 225, 0, 0); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 225, 0, 0); }
    }
</style>
</head>
<body>

<div class="main-container">
    <div class="welcome-image-container">
        <img src="images/pagina-de-obsequios-blusas.jpg" alt="Obsequios Blusas">
    </div>

    <div class="text-rectangle">
        🎁 Descarga tus obsequios por tu participación
    </div>

    <div class="flecha-container">
        <img src="images/flechita-abajo.png" alt="Flecha">
    </div>

    <a href="https://drive.google.com/drive/folders/1CdNoQTYEb-N2zRSqW3lhbX1BSPTsS0-p?usp=sharing" class="download-button">
        TOCA PARA DESCARGAR TUS OBSEQUIOS
    </a>
</div>

</body>
</html>
