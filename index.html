<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descarga tus obsequios</title>
    
    <style>
        /* ==========================================
           AJUSTES RÁPIDOS PARA NOVATOS 
           (Modifica los valores aquí abajo)
           ========================================== */
        :root {
            /* Espaciado entre elementos */
            --espacio-bloques: 25px; 

            /* Tamaño de la imagen principal (en %) */
            --escala-imagen-principal: 100%; 

            /* Tamaño de la flecha (en píxeles) */
            --escala-flecha: 60px; 

            /* Ajustes de Texto */
            --tamano-texto-principal: 22pt;
            --color-fondo-texto: #f3f0f0;
            --color-fuente-texto: #000000;
        }

        /* --- FONDO Y CUERPO --- */
        body {
            background-image: linear-gradient(to bottom, #c021f9, #f92e91);
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .main-container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        /* --- IMAGEN PRINCIPAL --- */
        .bloque-imagen-principal {
            margin-bottom: var(--espacio-bloques);
        }
        .bloque-imagen-principal img {
            width: var(--escala-imagen-principal);
            height: auto;
            border-radius: 17px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* --- RECUADRO DE TEXTO --- */
        .bloque-texto {
            background-color: var(--color-fondo-texto);
            color: var(--color-fuente-texto);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: var(--espacio-bloques);
            font-size: var(--tamano-texto-principal);
            font-weight: bold;
            line-height: 1.3;
        }

        /* --- LA FLECHA --- */
        .bloque-flecha {
            margin-bottom: var(--espacio-bloques);
        }
        .bloque-flecha img {
            width: var(--escala-flecha);
            height: auto;
        }

        /* --- BOTÓN CON EFECTO PULSAR --- */
        .boton-descarga {
            display: inline-block;
            background-color: #25D366; /* Verde tipo WhatsApp */
            color: white;
            padding: 22px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            width: 90%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            animation: efecto-pulsar 2s infinite;
        }

        @keyframes efecto-pulsar {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }
    </style>
</head>
<body>

    <div class="main-container">

        <div class="bloque-imagen-principal">
            <img src="images/pagina-de-obsequios-blusas.jpg" alt="Imagen Principal">
        </div>

        <div class="bloque-texto">
            🎁 Descarga tus obsequios por tu participación
        </div>

        <div class="bloque-flecha">
            <img src="images/flechita-abajo.png" alt="Flecha">
        </div>

        <a href="TU_LINK_AQUI" class="boton-descarga">
            TOCA PARA DESCARGAR TUS OBSEQUIOS
        </a>

    </div>

</body>
</html>
